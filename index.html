<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <h1>Rock Paper Scissors</h1>

    <div id="choices">
        <i class="fa-solid fa-hand-back-fist choice" id="rock" alt="Rock"></i>
        <i class="fa-solid fa-hand choice" id="paper" alt="Paper"></i>
        <i class="fa-solid fa-hand-scissors choice" id="scissor" alt="Scissor"></i>
    </div>

    <div id="score">
        <p class="user-score">0<br>You</p>
        <p class="comp-score">0<br>Computer</p>
    </div>

    <div id="plays">
        <p id="play">Play Your Move</p>
        <p id="computer-choice">Computer chosose: -</p>
    </div>

    <script src="app.js"></script>
</body>

</html>
